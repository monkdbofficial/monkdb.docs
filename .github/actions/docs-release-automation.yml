name: Docs Release Notes Automation

on:
  push:
    branches: ["main"]
    paths:
      - "docs/v3/releases/**"
      - "scripts/docs/generate_release_md.py"
      - ".github/workflows/docs-release-automation.yml"

jobs:
  generate-release-page:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate release page
        run: python3 scripts/docs/generate_release_md.py

      - name: Commit updated release page
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-generate release.md"
          file_pattern: docs/v3/release.md
