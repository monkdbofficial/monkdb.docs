name: Docs Release Notes Automation

on:
  pull_request:
    branches: ["main"]
    types: [closed]
    paths:
      - "v3/releases/**"
      - "scripts/docs/generate_release_md.py"
      - ".github/workflows/docs-release-automation.yml"

jobs:
  generate-release-page:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'staging' &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate release page
        run: python3 scripts/docs/generate_release_md.py

      - name: Commit updated release page
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-generate release.md"
          file_pattern: v3/release.md
